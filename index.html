<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mapa de Población de Alpacas - Región Puno</title>
    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin=""/>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <header class="header">
        <div class="header-content">
            <img src="imagen2.jpg" alt="Logo Izquierda" class="logo left-logo">
            <div class="header-titles">
                <h1>GERENCIA REGIONAL DE DESARROLLO AGRARIO</h1>
                <h2>MAPA DE POBLACIÓN DE ALPACAS - REGIÓN PUNO</h2>
            </div>
            <img src="imagen1.jpg" alt="Logo Derecha" class="logo right-logo">
        </div>
    </header>

    <div class="dashboard-container">
        <!-- Sidebar Filters -->
        <aside class="sidebar">
            <div class="sidebar-section">
                <h3>Año</h3>
                <select id="year-filter" class="filter-select">
                    <option value="2026">2026</option>
                    <option value="2025">2025</option>
                    <option value="2024">2024</option>
                    <option value="2023">2023</option>
                    <option value="2022">2022</option>
                    <option value="2021">2021</option>
                    <option value="2020">2020</option>
                </select>
            </div>

            <div class="sidebar-section">
                <h3>Provincia</h3>
                <select id="provincia-filter" class="filter-select">
                    <option value="ALL">Todas las Provincias</option>
                </select>
            </div>

            <div class="sidebar-section">
                <h3>Distrito</h3>
                <select id="distrito-filter" class="filter-select" disabled>
                    <option value="ALL">Todos los Distritos</option>
                </select>
            </div>
            
            <div class="stats-container">
                <div class="stat-box">
                    <div class="stat-value" id="total-pop">0</div>
                    <div class="stat-label">Total Alpacas</div>
                </div>
                <div class="stat-box">
                    <div class="stat-value" id="total-dists">0</div>
                    <div class="stat-label">Distritos Mostrados</div>
                </div>
            </div>

            <div class="legend-container">
                <h3>Leyenda de Población</h3>
                <div id="legend-content"></div>
            </div>
        </aside>

        <!-- Map Area -->
        <main class="map-container">
            <div id="map"></div>
        </main>
    </div>

    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
    
    <!-- Data Files -->
    <script src="map_data.js"></script>
    
    <!-- App Logic -->
    <script src="app.js"></script>
</body>
</html>
