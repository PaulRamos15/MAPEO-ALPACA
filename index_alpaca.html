<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mapa de Población de Alpacas - Región Puno</title>
    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin=""/>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: 'Inter', sans-serif;
    background-color: #f8fafc;
    color: #1e293b;
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
}

/* Header */
.header {
    background-color: #ffffff;
    border-bottom: 1px solid #e2e8f0;
    padding: 10px 24px;
    box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
    z-index: 1000;
}

.header-content {
    display: flex;
    justify-content: space-between;
    align-items: center;
    max-width: 1800px;
    margin: 0 auto;
}

.logo {
    height: 60px;
    object-fit: contain;
}

.header-titles {
    text-align: center;
    flex-grow: 1;
    padding: 0 20px;
}

.header-titles h1 {
    font-size: 1.25rem;
    font-weight: 800;
    color: #0f172a;
    margin-bottom: 4px;
}

.header-titles h2 {
    font-size: 0.95rem;
    font-weight: 600;
    color: #475569;
    text-transform: uppercase;
    letter-spacing: 0.05em;
}

/* Layout */
.dashboard-container {
    display: flex;
    flex: 1;
    height: calc(100vh - 81px); /* minus header */
}

/* Sidebar */
.sidebar {
    width: 320px;
    background-color: #ffffff;
    border-right: 1px solid #e2e8f0;
    padding: 24px;
    display: flex;
    flex-direction: column;
    gap: 20px;
    overflow-y: auto;
    z-index: 999;
    box-shadow: 4px 0 10px rgba(0,0,0,0.02);
}

.sidebar-section h3 {
    font-size: 0.85rem;
    font-weight: 600;
    color: #64748b;
    margin-bottom: 8px;
    text-transform: uppercase;
    letter-spacing: 0.05em;
}

.filter-select {
    width: 100%;
    padding: 10px 12px;
    border: 1px solid #cbd5e1;
    border-radius: 6px;
    font-size: 0.95rem;
    color: #334155;
    background-color: #f8fafc;
    outline: none;
    transition: all 0.2s ease;
    cursor: pointer;
    font-family: 'Inter', sans-serif;
}

.filter-select:focus {
    border-color: #3b82f6;
    box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
}

.filter-select:disabled {
    background-color: #e2e8f0;
    cursor: not-allowed;
    opacity: 0.7;
}

/* Stats */
.stats-container {
    display: flex;
    gap: 12px;
    margin-top: 10px;
}

.stat-box {
    flex: 1;
    background-color: #f1f5f9;
    padding: 16px 12px;
    border-radius: 8px;
    text-align: center;
    border: 1px solid #e2e8f0;
}

.stat-value {
    font-size: 1.4rem;
    font-weight: 800;
    color: #0f172a;
}

.stat-label {
    font-size: 0.75rem;
    font-weight: 600;
    color: #64748b;
    margin-top: 4px;
}

/* Legend */
.legend-container {
    margin-top: 10px;
    background-color: #f8fafc;
    border: 1px solid #e2e8f0;
    border-radius: 8px;
    padding: 16px;
}

.legend-container h3 {
    font-size: 0.85rem;
    font-weight: 600;
    color: #64748b;
    margin-bottom: 12px;
    text-transform: uppercase;
    border-bottom: 1px solid #e2e8f0;
    padding-bottom: 8px;
}

.legend-item {
    display: flex;
    align-items: center;
    margin-bottom: 8px;
    font-size: 0.85rem;
    color: #334155;
}

.legend-item:last-child {
    margin-bottom: 0;
}

.legend-color {
    width: 16px;
    height: 16px;
    border-radius: 4px;
    margin-right: 12px;
    border: 1px solid rgba(0,0,0,0.1);
    flex-shrink: 0;
}

.legend-text {
    display: flex;
    flex-direction: column;
}

.legend-label {
    font-weight: 600;
}

.legend-range {
    font-size: 0.75rem;
    color: #64748b;
}

/* Map */
.map-container {
    flex: 1;
    position: relative;
}

#map {
    width: 100%;
    height: 100%;
    background-color: #e5e7eb;
}

/* Custom Tooltip */
.custom-tooltip {
    background: white;
    border: none;
    border-radius: 8px;
    box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
    padding: 12px 16px;
    font-family: 'Inter', sans-serif;
    color: #1e293b;
}

.custom-tooltip h4 {
    margin: 0 0 8px 0;
    font-size: 1.1rem;
    font-weight: 800;
    color: #0f172a;
    border-bottom: 1px solid #e2e8f0;
    padding-bottom: 6px;
}

.custom-tooltip p {
    margin: 4px 0;
    font-size: 0.9rem;
    color: #475569;
}

.custom-tooltip p strong {
    color: #0f172a;
    font-weight: 600;
}

.custom-tooltip .pop-value {
    font-size: 1.1rem;
    font-weight: 800;
    color: #2563eb;
    margin-top: 8px;
}

</style>
</head>

    <!-- App Logic -->
    <script>
// Initialize Map
const map = L.map('map', {
    zoomControl: false // We can add it manually to top-right
}).setView([-15.0, -70.0], 7);

L.control.zoom({
    position: 'topright'
}).addTo(map);

// Add Base Layer (CartoDB Positron for a clean, premium look)
L.tileLayer('https://{s}.basemaps.cartocdn.com/light_nolabels/{z}/{x}/{y}{r}.png', {
    attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors &copy; <a href="https://carto.com/attributions">CARTO</a>',
    subdomains: 'abcd',
    maxZoom: 20
}).addTo(map);

// Add labels on top of the data if needed (we'll just use tooltips for a cleaner look)

// Global variables
let geoJsonLayer;
let currentYear = '2026';
let currentProvincia = 'ALL';
let currentDistrito = 'ALL';

// Colors based on original script, adjusted slightly for light theme
const COLOR_MAP = {
    'SIN_POBLACION': '#e2e8f0', // slate-200
    'BAJA': '#81c784',         // light green
    'REGULAR': '#fff176',      // yellow
    'ALTA': '#e57373',         // red-light
    'MUY_ALTA': '#c62828'      // red-dark
};

const CATEGORY_NAMES = {
    'SIN_POBLACION': 'Sin Población',
    'BAJA': 'Baja',
    'REGULAR': 'Regular',
    'ALTA': 'Alta',
    'MUY_ALTA': 'Muy Alta'
};

// Elements
const yearSelect = document.getElementById('year-filter');
const provSelect = document.getElementById('provincia-filter');
const distSelect = document.getElementById('distrito-filter');
const totalPopEl = document.getElementById('total-pop');
const totalDistsEl = document.getElementById('total-dists');
const legendContent = document.getElementById('legend-content');

// Helper to format numbers with commas
const formatNumber = (num) => num.toLocaleString('en-US');

// Initialize filters
function initFilters() {
    const provincias = new Set();
    
    // Extract unique provinces
    Object.values(mapData).forEach(d => {
        provincias.add(d.Provincia);
    });

    // Populate province select
    Array.from(provincias).sort().forEach(p => {
        const option = document.createElement('option');
        option.value = p;
        option.textContent = p;
        provSelect.appendChild(option);
    });

    // Event listeners
    yearSelect.addEventListener('change', (e) => {
        currentYear = e.target.value;
        updateDashboard();
    });

    provSelect.addEventListener('change', (e) => {
        currentProvincia = e.target.value;
        updateDistritos();
        updateDashboard();
    });

    distSelect.addEventListener('change', (e) => {
        currentDistrito = e.target.value;
        updateDashboard();
    });
}

function updateDistritos() {
    // Reset district select
    distSelect.innerHTML = '<option value="ALL">Todos los Distritos</option>';
    
    if (currentProvincia === 'ALL') {
        distSelect.disabled = true;
        currentDistrito = 'ALL';
        return;
    }

    distSelect.disabled = false;
    const distritos = new Set();

    Object.values(mapData).forEach(d => {
        if (d.Provincia === currentProvincia) {
            distritos.add(d.Distrito);
        }
    });

    Array.from(distritos).sort().forEach(d => {
        const option = document.createElement('option');
        option.value = d;
        option.textContent = d;
        distSelect.appendChild(option);
    });
}

// Calculate quantiles
function calculateQuantiles(values) {
    if (values.length === 0) return { q1: 0, q2: 0, q3: 0 };
    
    const sorted = values.slice().sort((a, b) => a - b);
    
    const pos1 = (sorted.length - 1) * 0.25;
    const pos2 = (sorted.length - 1) * 0.50;
    const pos3 = (sorted.length - 1) * 0.75;
    
    const getVal = (pos) => {
        const base = Math.floor(pos);
        const rest = pos - base;
        if (sorted[base + 1] !== undefined) {
            return sorted[base] + rest * (sorted[base + 1] - sorted[base]);
        } else {
            return sorted[base];
        }
    };
    
    return {
        q1: getVal(pos1),
        q2: getVal(pos2),
        q3: getVal(pos3)
    };
}

// Get filtered data
function getFilteredData() {
    let activeData = [];
    let popValues = [];
    let totalPop = 0;

    Object.entries(mapData).forEach(([ubigeo, info]) => {
        const matchProv = currentProvincia === 'ALL' || info.Provincia === currentProvincia;
        const matchDist = currentDistrito === 'ALL' || info.Distrito === currentDistrito;

        if (matchProv && matchDist) {
            const pop = info.Poblacion[currentYear] || 0;
            activeData.push({ ubigeo, pop });
            totalPop += pop;
            if (pop > 0) popValues.push(pop);
        }
    });

    return { activeData, popValues, totalPop };
}

// Update dashboard (Map, Legend, Stats)
function updateDashboard() {
    const { activeData, popValues, totalPop } = getFilteredData();
    
    const activeUbigeos = new Set(activeData.map(d => d.ubigeo));
    const quantiles = calculateQuantiles(popValues);
    
    let maxPop = popValues.length > 0 ? Math.max(...popValues) : 0;
    let minPop = popValues.length > 0 ? Math.min(...popValues) : 0;

    // Update stats
    totalPopEl.textContent = formatNumber(totalPop);
    totalDistsEl.textContent = activeData.length;

    // Classification function
    const classify = (val) => {
        if (val <= 0) return 'SIN_POBLACION';
        if (val <= quantiles.q1) return 'BAJA';
        if (val <= quantiles.q2) return 'REGULAR';
        if (val <= quantiles.q3) return 'ALTA';
        return 'MUY_ALTA';
    };

    // Update Legend
    const legendRanges = {
        'SIN_POBLACION': '0 cabezas',
        'BAJA': `${formatNumber(minPop)} - ${formatNumber(Math.round(quantiles.q1))} cabezas`,
        'REGULAR': `${formatNumber(Math.round(quantiles.q1) + 1)} - ${formatNumber(Math.round(quantiles.q2))} cabezas`,
        'ALTA': `${formatNumber(Math.round(quantiles.q2) + 1)} - ${formatNumber(Math.round(quantiles.q3))} cabezas`,
        'MUY_ALTA': `${formatNumber(Math.round(quantiles.q3) + 1)} - ${formatNumber(maxPop)} cabezas`
    };

    let legendHTML = '';
    const cats = ['SIN_POBLACION', 'BAJA', 'REGULAR', 'ALTA', 'MUY_ALTA'];
    
    // Count districts per category
    const catCounts = { 'SIN_POBLACION':0, 'BAJA':0, 'REGULAR':0, 'ALTA':0, 'MUY_ALTA':0 };
    activeData.forEach(d => {
        catCounts[classify(d.pop)]++;
    });

    cats.forEach(cat => {
        legendHTML += `
            <div class="legend-item">
                <div class="legend-color" style="background-color: ${COLOR_MAP[cat]}"></div>
                <div class="legend-text">
                    <span class="legend-label">${CATEGORY_NAMES[cat]}</span>
                    <span class="legend-range">${legendRanges[cat]} (${catCounts[cat]} dists)</span>
                </div>
            </div>
        `;
    });
    legendContent.innerHTML = legendHTML;

    // Remove existing layer if exists
    if (geoJsonLayer) {
        map.removeLayer(geoJsonLayer);
    }

    // Create GeoJSON Layer
    geoJsonLayer = L.geoJSON(mapGeoJSON, {
        filter: function(feature) {
            return activeUbigeos.has(feature.properties.UBIGEO);
        },
        style: function(feature) {
            const ubigeo = feature.properties.UBIGEO;
            const pop = mapData[ubigeo].Poblacion[currentYear] || 0;
            const category = classify(pop);

            return {
                fillColor: COLOR_MAP[category],
                weight: 1,
                opacity: 1,
                color: 'rgba(255,255,255,0.7)',
                fillOpacity: 0.9
            };
        },
        onEachFeature: function(feature, layer) {
            const ubigeo = feature.properties.UBIGEO;
            const info = mapData[ubigeo];
            const pop = info.Poblacion[currentYear] || 0;
            const category = classify(pop);

            // Tooltip
            const tooltipContent = `
                <div class="custom-tooltip">
                    <h4>${info.Distrito}</h4>
                    <p><strong>Provincia:</strong> ${info.Provincia}</p>
                    <p><strong>Altitud:</strong> ${info.Altitud} m.s.n.m.</p>
                    <p><strong>Clasificación:</strong> ${CATEGORY_NAMES[category]}</p>
                    <div class="pop-value">Alpacas: ${formatNumber(pop)}</div>
                </div>
            `;
            
            layer.bindTooltip(tooltipContent, {
                sticky: true,
                className: 'custom-tooltip-container',
                direction: 'auto'
            });

            // Hover effects
            layer.on({
                mouseover: function(e) {
                    const l = e.target;
                    l.setStyle({
                        weight: 2,
                        color: '#0f172a',
                        fillOpacity: 1
                    });
                    if (!L.Browser.ie && !L.Browser.opera && !L.Browser.edge) {
                        l.bringToFront();
                    }
                },
                mouseout: function(e) {
                    geoJsonLayer.resetStyle(e.target);
                }
            });
        }
    }).addTo(map);

    // Fit map bounds to show all active data
    if (activeData.length > 0) {
        map.fitBounds(geoJsonLayer.getBounds());
    }
}

// Add some extra CSS dynamically for tooltip container
const style = document.createElement('style');
style.innerHTML = `
    .leaflet-tooltip.custom-tooltip-container {
        background: transparent;
        border: none;
        box-shadow: none;
        padding: 0;
    }
    .leaflet-tooltip-left.custom-tooltip-container::before {
        display: none;
    }
    .leaflet-tooltip-right.custom-tooltip-container::before {
        display: none;
    }
`;
document.head.appendChild(style);

// Run initialization
initFilters();
updateDashboard();

</script>
